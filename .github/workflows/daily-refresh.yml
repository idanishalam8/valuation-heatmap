name: Daily Data Refresh

on:
  schedule:
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to refresh data
        run: |
          curl -s https://valuation-heatmap-danishalam.streamlit.app/ || true
          echo "App pinged at $(date)"